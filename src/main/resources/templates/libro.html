<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Gestion Libros</title>
</head>
<body>
    
    <table class="table">
        <thead>
            <tr>
                <th>Id Libro</th>
                <th>ISBN</th>
                <th>Titulo</th>
                <th>Autor</th>
                <th>Editorial</th>
                <th>Fecha de alta</th>
                <th>Fecha de baja</th>
                <th>Foto</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="libros : ${libros}">
                <td th:text="${libros.Id_libro}"></td>
                <td th:text="${libros.Isbn}"></td>
                <td th:text="${libros.Titulo}"></td>
               	<td th:text="${libros.Autor}"></td>
                <td th:text="${libros.Editorial}"></td>
                <td th:text="${libros.Fecha_alta}"></td>
                <td th:text="${libros.Fecha_baja}"></td>
                <td th:text="${libros.Foto}"></td>
                <!-- <input th:field="*{unidades}" type="Number"
                    placeholder="1" min="1" /> <input th:field="*{producto}"
                    type="hidden" th:value="${producto.Cod_Prod}" /> <input
                    th:field="*{pedido}" type="hidden" th:value="1" />-->
                <!-- Código del formulario para comprar. Da error al intentar 
                    agregar el producto por POST -->
            </tr>
        </tbody>
    </table>
<!-- </form>-->

</body>
</html>
