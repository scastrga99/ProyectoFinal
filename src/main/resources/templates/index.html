<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC">
<title>Document</title>
</head>
<body>
	<div class="container-100%">
		<nav class="navbar navbar-expand-lg navbar-light"
			style="background-color: #e3f2fd">
			<div class="container-fluid display: flex; display: inline;">
				<a class="navbar-brand" href="#">Gestion de Inventario</a>
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarNav"
					aria-controls="navbarNav" aria-expanded="false"
					aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item"><a class="nav-link active"
							th:href="@{/material}">Material</a></li>
						<li class="nav-item"><a class="nav-link active"
							th:href="@{/libro}">Libros</a></li>
						<li class="nav-item"><a class="nav-link active" href="#">Guía
								de la Aplicación</a></li>
						<li class="nav-item"><a class="nav-link active" href="#">Sección
								de Reclamaciones </a></li>
					</ul>
				</div>
				<div class="nav-user"
					style="flex-direction: row-reverse; padding: 5px; background-color: #afd8f5; border-radius: 3px;">
					<a href="#" style="text-decoration: none; color: black;">Perfil
						Usuario</a>
				</div>
			</div>
		</nav>

		<div>
			<span th:if="{session.correo !=null}">Bienvenido/a <span class="font-italic" th:text="${session.correo.correo}"></span></span>
			
			<form th:action="@{/logout}" method="POST">
			<button type="submit" class="btn-btn-primary mt-3">Salir</button></form>
		</div>
	</div>
</body>
</html>
